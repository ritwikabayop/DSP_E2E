<!DOCTYPE html>
<html>
<head>
<style>
    :root {
        --main-orange: #d35400;
        --soft-red: #e74c3c;
        --bg-cream: #fdfaf5; /* Matches your dashboard */
    }

    .orbital-profile {
        display: flex;
        align-items: center;
        gap: 15px;
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(10px);
        padding: 8px 20px 8px 8px;
        border-radius: 50px;
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        width: fit-content;
    }

    /* THE ROUND THING: Orbital Core */
    .orb-wrapper {
        position: relative;
        width: 52px;
        height: 52px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Rotating outer ring */
    .orb-ring {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top: 2px solid var(--main-orange);
        border-right: 2px solid var(--main-orange);
        animation: rotate 3s linear infinite;
    }

    @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    .orb-core {
        width: 42px;
        height: 42px;
        background: var(--main-orange);
        background: linear-gradient(135deg, #FF8C00 0%, #d35400 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-family: 'Segoe UI', sans-serif;
        font-weight: 800;
        font-size: 20px;
        box-shadow: inset 0 2px 4px rgba(255,255,255,0.4);
        z-index: 2;
    }

    /* TEXT STYLING */
    .orb-info {
        display: flex;
        flex-direction: column;
    }

    .orb-name {
        font-size: 16px;
        font-weight: 800;
        color: #333;
        letter-spacing: 0.5px;
        margin-bottom: -2px;
    }

    .orb-role-pill {
        font-size: 10px;
        font-weight: 700;
        color: var(--soft-red);
        background: rgba(231, 76, 60, 0.1);
        padding: 1px 8px;
        border-radius: 20px;
        border: 1px solid rgba(231, 76, 60, 0.2);
        width: fit-content;
        text-transform: uppercase;
    }
</style>
</head>
<body>

<div class="orbital-profile">
    <div class="orb-wrapper">
        <div class="orb-ring"></div>
        <div class="orb-core">A</div>
    </div>
    <div class="orb-info">
        <span class="orb-name">ABAY</span>
        <span class="orb-role-pill">Operation User</span>
    </div>
</div>

</body>
</html>
