<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Top-left: orange + trend line -->
  <rect x="0" y="0" width="15" height="15" rx="3.5" fill="url(#tl)"/>
  <polyline points="2,10 5.5,6.5 9,8.5 13,3.5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Top-right: charcoal + bar chart -->
  <rect x="17" y="0" width="15" height="15" rx="3.5" fill="url(#tr)"/>
  <rect x="19.5" y="8"  width="2.5" height="5" rx="0.8" fill="white" opacity="0.9"/>
  <rect x="23"   y="5.5" width="2.5" height="7.5" rx="0.8" fill="white" opacity="0.9"/>
  <rect x="26.5" y="3"  width="2.5" height="10" rx="0.8" fill="white" opacity="0.9"/>

  <!-- Bottom-left: orange + person -->
  <rect x="0" y="17" width="15" height="15" rx="3.5" fill="url(#bl)"/>
  <circle cx="7.5" cy="21.5" r="2.5" fill="white" opacity="0.95"/>
  <path d="M2.5,30 Q2.5,25.5 7.5,25.5 Q12.5,25.5 12.5,30" stroke="white" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.95"/>

  <!-- Bottom-right: dark green + status dot -->
  <rect x="17" y="17" width="15" height="15" rx="3.5" fill="url(#br)"/>
  <circle cx="24.5" cy="24.5" r="3.5" fill="#a3e635"/>
  <circle cx="24.5" cy="24.5" r="3.5" fill="url(#shine)"/>

  <!-- Orange spark lines top-right -->
  <line x1="23" y1="1.5" x2="25" y2="0"   stroke="#f97316" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="26.5" y1="0.8" x2="28" y2="2.5" stroke="#f97316" stroke-width="1.4" stroke-linecap="round"/>

  <defs>
    <linearGradient id="tl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="tr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#2d2d2d"/>
    </linearGradient>
    <linearGradient id="bl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="br" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d6a35"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <radialGradient id="shine" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="white" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
